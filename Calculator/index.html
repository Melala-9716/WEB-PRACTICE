<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
   <link rel="stylesheet" href="index.css">
</head>
<body>
   <section id="container">
    <input id="Display" type="text" readonly>
    <div id="container2">
        <button onclick="appendToDisplay('+')" class="colours" class="buttons" id="btn+">+</button>
        <button onclick="appendToDisplay('7')" class="buttons" id="btn7">7</button>
        <button onclick="appendToDisplay('8')" class="buttons" id="btn8">8</button>
        <button onclick="appendToDisplay('9')" class="buttons" id="btn9">9</button>
        <button onclick="appendToDisplay('-')" class="colours"  class="buttons" id="btn-" >-</button>
        <button onclick="appendToDisplay('4')" class="buttons" id="btn4" >4</button>
        <button onclick="appendToDisplay('5')" class="buttons" id="btn5" >5</button>
        <button onclick="appendToDisplay('6')" class="buttons" id="btn6">6</button>
        <button onclick="appendToDisplay('*')" class="colours"  class="buttons" id="btn*">*</button>
        <button onclick="appendToDisplay('1')" class="buttons"  id="btn1">1</button>
        <button onclick="appendToDisplay('2')" class="buttons" id="btn2">2</button>
        <button onclick="appendToDisplay('3')" class="buttons" id="btn3">3</button>
        <button onclick="appendToDisplay('/')" class="colours" class="buttons" id="btn/">/</button>
        <button onclick="appendToDisplay('0')" class="buttons" id="btn0">0</button>
        <button onclick="appendToDisplay('.')" class="buttons" id="btn."> . </button>
        <button onclick="calculate()" class="buttons" id="btn=">=</button>
        <button onclick="clearDisplay()" class="colours"  class="buttons" id="btnc">C</button>
        <button onclick="clearoneDisplay()" class="buttons"  class="buttons" id="btnc">x</button>
    </div>
   </section>
    <script src="/Calculator/index.js"></script>
</body>
</html>
