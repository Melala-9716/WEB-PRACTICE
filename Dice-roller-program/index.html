<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Website</title>
    <style>
        body{
            background-color: white;
            font-size: 50px;
        }
        #container{
            text-align: center;
        }
        h1{
            font-size: 3rem;
        }
        button{
            font-size: 1.5rem;
            border: none;
            background-color: rgb(212, 18, 50);
            border-radius: 10px;
            color: aliceblue;
            height: 40px;
            cursor: pointer;
        }
        button:hover{
            background-color: rgb(240, 146, 23);
            color: black;
        }
        span{
            font-size: 1.9rem;
        }
        input{
            text-align: center;
            font-size: 1.7rem;
            width: 400px;
        }
        #diceImages{
          display: grid;
          grid-template-columns: 100px 100px 100px;
          column-gap: 110px;
          row-gap: 10px;
          justify-content: center;
        }
        #diceImages img{
            width: 200px;
            height: 200px;
        }
        @media (max-width: 600px) {
             #diceImages{
          display: flex !important;
           flex-direction: column;
           justify-content: center;
           align-items: center;
           margin: 0px;
        }
          #diceImages img{
            width: 200px;
            height: 200px;
        }
        }
          @media (max-width: 1024px) {
              #diceImages{
                display: grid;
                grid-template-columns: 100px 100px;
                column-gap:110px;
                justify-content: center;
                align-items: center;
              }
          }
      </style>
</head>
<body>
  <div id="container">
    <h1>Dice Roller</h1>
    <span># of dice</span>
    <input id="numofDice" type="number" value="1" min="1" max="6">
    <button onclick="rollDice()" id="D" type="button">Roll Dice</button>
    <div id="diceResult"></div>
    <div id="diceImages"></div>
</div>
<script src="index.js"></script>
</body>
</html>
