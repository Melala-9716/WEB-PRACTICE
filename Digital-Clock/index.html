<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital-Clock</title>
    <style>
        *{
            box-sizing: border-box;
        }
        body{
                margin:0;
                background: url('city.jpg') no-repeat fixed center/cover;
        }
       #clock-container{
        display: flex;
        justify-content: center;
        height:100vh;
        align-items: center;
       }
       #clock{
        font-family: monospace;
        font-size: 6.5rem;
        font-weight: bold;
        background-color: hsl(0, 0%, 100%,0.3);
        width: 100%;
        height: 180px;
        padding-top: 30px;
        text-align: center;
       backdrop-filter: blur(0.5px);
       }
 </style>
</head>
<body>
     <div id="clock-container">
        <div id="clock"> </div>
    </div>
<script src="/Digital-Clock\index.js"></script>
</body>
</html>
